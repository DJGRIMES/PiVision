version: "3.9"

services:
  backend:
    image: ${PIVISION_BACKEND_IMAGE:-docker.io/pivision/backend:latest}
    ports:
      - "8080:8080"
    volumes:
      - ${PIVISION_DATA_DIR:-/mnt/pivision/data}:/app/backend/data
    environment:
      PORT: 8080
      PIVISION_DEVICE_KEY: ${PIVISION_DEVICE_KEY:-pi-device-key}
    healthcheck:
      test: ["CMD-SHELL", "python3 - <<'PY'\nimport http.client, sys\nconn = http.client.HTTPConnection('localhost', 8080, timeout=2)\nconn.request('GET', '/health')\nresp = conn.getresponse()\nif resp.status != 200:\n    sys.exit(1)\nPY"]
      interval: 15s
      timeout: 5s
      retries: 3

  worker:
    image: ${PIVISION_WORKER_IMAGE:-docker.io/pivision/backend:latest}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ${PIVISION_DATA_DIR:-/mnt/pivision/data}:/app/backend/data
    command: python3 backend/worker.py

  retention:
    image: ${PIVISION_RETENTION_IMAGE:-docker.io/pivision/backend:latest}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ${PIVISION_DATA_DIR:-/mnt/pivision/data}:/app/backend/data
    command: python3 scripts/retention.py
    restart: "no"

  dashboard:
    image: ${PIVISION_DASHBOARD_IMAGE:-python:3.12-slim}
    ports:
      - "4173:4173"
    working_dir: /workspace/dashboard
    volumes:
      - ${PIVISION_DASHBOARD_DIR:-/mnt/pivision/dashboard}:/workspace
    environment:
      PIVISION_API_BASE: http://backend:8080/api/v1
    command: python3 -m http.server 4173
